name: CI Build and Test

on: [push, pull_request]

# Keeps the environment forced to Node 24 for any background processes
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5  # Upgraded to v5 to remove metadata warnings

      - name: Set up Python
        uses: actions/setup-python@v6  # Upgraded to v6 to remove metadata warnings
        with:
          python-version: '3.11'

      - name: Install System Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgeographiclib-dev

      - name: Install Python Deps
        run: |
          python -m pip install --upgrade pip
          pip install meson ninja cython numpy pytest scipy h5py netCDF4 wradlib

      - name: Build and Install
        run: |
          export CPLUS_INCLUDE_PATH=/usr/include/GeographicLib:$CPLUS_INCLUDE_PATH
          pip install .

      - name: Run Tests
        run: |
          pytest tests/

