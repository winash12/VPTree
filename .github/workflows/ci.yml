name: CI Build and Test

on: [push, pull_request]

# Forces the runner to use Node 24 to silence deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install System Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgeographiclib-dev

      - name: Install Python Deps
        run: |
          python -m pip install --upgrade pip
          pip install meson ninja cython numpy pytest scipy h5py netCDF4 wradlib

      - name: Build and Install
        run: |
          # Include both possible GeographicLib paths for safety
          export CPLUS_INCLUDE_PATH=/usr/include/GeographicLib:/usr/include/geographiclib:$CPLUS_INCLUDE_PATH
          pip install .

      - name: Run Tests
        run: |
          # The --import-mode flag ensures pytest finds the installed module
          # rather than looking in the local source folder.
          python -m pytest tests/ --import-mode=importlib