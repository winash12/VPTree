name: CI Build and Test

on: [push, pull_request]

# Add this to opt-in to Node 24 now and clear the warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.7  # Specify the latest minor version

      - name: Set up Python
        uses: actions/setup-python@v5.2.0  # Specify the latest minor version
        with:
          python-version: '3.11'

      - name: Install System Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgeographic-dev

      - name: Install Python Deps
        run: |
          python -m pip install --upgrade pip
          # We add the scientific stack your legacy test requires
          pip install meson ninja cython numpy pytest scipy h5py netCDF4 wradlib

      - name: Build and Install
        run: |
          # Ensuring the compiler can find the geographiclib headers if needed
          export CPLUS_INCLUDE_PATH=/usr/include/GeographicLib:$CPLUS_INCLUDE_PATH
          pip install .

      - name: Run Tests
        run: |
          # If tests/ is empty, pytest might return an error code. 
          # This runs it only if the directory exists and has files.
          pytest tests/
          