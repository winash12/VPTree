name: CI Build and Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Forces the runner to use Node 24 to silence deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            libgeographiclib-dev \
            pybind11-dev \
            xtensor-dev \
            build-essential

      - name: Install xtensor-python (Header-only)
        run: |
          # xtensor-python is usually not in apt; we fetch the headers manually
          # 1. Install xtl (Core dependency)        
          git clone --depth 1 https://github.com/xtensor-stack/xtl.git
          sudo cp -r xtl/include/xtl /usr/local/include/

          # 2. Install base xtensor
          git clone --depth 1 https://github.com/xtensor-stack/xtensor.git
          sudo cp -r xtensor/include/xtensor /usr/local/include/
          
          # 3. Install xtensor-python
          git clone --depth 1 https://github.com/xtensor-stack/xtensor-python.git
          sudo cp -r xtensor-python/include/xtensor-python /usr/local/include/
          
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          # We include 'build' to ensure a clean pep517 build environment
          pip install meson ninja cython numpy pytest scipy h5py netCDF4 wradlib build

      - name: Build and Install Extension
        run: |
          # 1. Ensure GeographicLib headers are discoverable in standard paths
          # Some Ubuntu versions put them in /usr/include/GeographicLib/
          sudo ln -s /usr/include/GeographicLib /usr/include/geographiclib || true
          
          # 2. Build and install the package
          # Using -v (verbose) is critical here so you can see C++ compiler errors in the CI logs
          pip install . -v 

      - name: Verify Installation
        run: |
          # Quick smoke test to ensure the .so files are importable and linked correctly
          python -c "import gpm_engine; print('C++ Extensions Loaded Successfully!')"

      - name: Run Tests
        run: |
          # Use importlib mode to ensure we test the INSTALLED package, not the source folder
          python -m pytest tests/ --import-mode=importlib