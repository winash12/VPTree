name: CI Build and Test

on: [push, pull_request]

# Keeps the environment forced to Node 24 for any background processes
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install System Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgeographiclib-dev

      - name: Install Python Deps
        run: |
          python -m pip install --upgrade pip
          pip install meson ninja cython numpy pytest scipy h5py netCDF4 wradlib

      - name: Build and Install
        run: |
          # Adding both common GeographicLib paths to be safe
          export CPLUS_INCLUDE_PATH=/usr/include/GeographicLib:/usr/include/geographiclib:$CPLUS_INCLUDE_PATH
          pip install .

      - name: Run Tests
        run: |
          # Move into the tests directory so pytest doesn't try 
          # to import from the local source folder
          cd tests
          python -m pytest test_legacy.py